<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>cs-avatar 组件预览</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../fonts/cses-icons.css?v=101">
  <link rel="stylesheet" href="avatar.css">
  <style>
    body { padding: 32px; background: #f5f5f5; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .section-title { font: var(--typo-cn-16-medium); color: var(--cs-color-text); margin-bottom: 16px; }
    .section-subtitle { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .row-label { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); width: 80px; flex-shrink: 0; }
    .dark-bg { background: var(--cs-color-bg-app-dark); padding: 16px; border-radius: 8px; display: flex; align-items: center; gap: 16px; }
  </style>
</head>
<body>

<!-- 图片头像 -->
<div class="section">
  <div class="section-title">图片头像</div>
  <div class="section-subtitle">内部放 &lt;img&gt; 标签</div>

  <div class="row">
    <span class="row-label">尺寸</span>
    <cs-avatar data-color="blue" data-size="xs"><img src="https://i.pravatar.cc/40?img=1" alt=""></cs-avatar>
    <cs-avatar data-color="green" data-size="sm"><img src="https://i.pravatar.cc/48?img=2" alt=""></cs-avatar>
    <cs-avatar data-color="orange"><img src="https://i.pravatar.cc/64?img=3" alt=""></cs-avatar>
    <cs-avatar data-color="red" data-size="lg"><img src="https://i.pravatar.cc/80?img=4" alt=""></cs-avatar>
    <cs-avatar data-color="purple" data-size="xl"><img src="https://i.pravatar.cc/96?img=5" alt=""></cs-avatar>
  </div>

  <div class="row">
    <span class="row-label">方形</span>
    <cs-avatar data-color="sky" data-size="xs" data-shape="square"><img src="https://i.pravatar.cc/40?img=6" alt=""></cs-avatar>
    <cs-avatar data-color="pink" data-size="sm" data-shape="square"><img src="https://i.pravatar.cc/48?img=7" alt=""></cs-avatar>
    <cs-avatar data-color="blue" data-shape="square"><img src="https://i.pravatar.cc/64?img=8" alt=""></cs-avatar>
    <cs-avatar data-color="green" data-size="lg" data-shape="square"><img src="https://i.pravatar.cc/80?img=9" alt=""></cs-avatar>
    <cs-avatar data-color="orange" data-size="xl" data-shape="square"><img src="https://i.pravatar.cc/96?img=10" alt=""></cs-avatar>
  </div>
</div>

<!-- 文字头像 -->
<div class="section">
  <div class="section-title">文字头像（首字母）</div>
  <div class="section-subtitle">data-color 控制背景色</div>

  <div class="row">
    <span class="row-label">颜色</span>
    <cs-avatar data-color="blue"><span class="avatar-text">张</span></cs-avatar>
    <cs-avatar data-color="red"><span class="avatar-text">李</span></cs-avatar>
    <cs-avatar data-color="green"><span class="avatar-text">王</span></cs-avatar>
    <cs-avatar data-color="orange"><span class="avatar-text">赵</span></cs-avatar>
    <cs-avatar data-color="purple"><span class="avatar-text">刘</span></cs-avatar>
    <cs-avatar data-color="pink"><span class="avatar-text">陈</span></cs-avatar>
    <cs-avatar data-color="sky"><span class="avatar-text">杨</span></cs-avatar>
  </div>

  <div class="row">
    <span class="row-label">尺寸</span>
    <cs-avatar data-size="xs" data-color="blue"><span class="avatar-text">张</span></cs-avatar>
    <cs-avatar data-size="sm" data-color="red"><span class="avatar-text">李</span></cs-avatar>
    <cs-avatar data-color="green"><span class="avatar-text">王</span></cs-avatar>
    <cs-avatar data-size="lg" data-color="orange"><span class="avatar-text">赵</span></cs-avatar>
    <cs-avatar data-size="xl" data-color="purple"><span class="avatar-text">刘</span></cs-avatar>
  </div>
</div>

<!-- 图标头像 -->
<div class="section">
  <div class="section-title">图标头像（默认占位）</div>
  <div class="section-subtitle">无图片时显示默认人物图标</div>

  <div class="row">
    <span class="row-label">尺寸</span>
    <cs-avatar data-color="red" data-size="xs"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
    <cs-avatar data-color="purple" data-size="sm"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
    <cs-avatar data-color="sky"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
    <cs-avatar data-color="pink" data-size="lg"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
    <cs-avatar data-color="blue" data-size="xl"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
  </div>
</div>

<!-- 在线状态 -->
<div class="section">
  <div class="section-title">在线状态</div>
  <div class="section-subtitle">.avatar-status + data-online/busy/away/offline</div>

  <div class="row">
    <span class="row-label">状态</span>
    <cs-avatar data-color="green" data-size="lg"><img src="https://i.pravatar.cc/80?img=11" alt=""><span class="avatar-status" data-online></span></cs-avatar>
    <cs-avatar data-color="orange" data-size="lg"><img src="https://i.pravatar.cc/80?img=12" alt=""><span class="avatar-status" data-busy></span></cs-avatar>
    <cs-avatar data-color="red" data-size="lg"><img src="https://i.pravatar.cc/80?img=13" alt=""><span class="avatar-status" data-away></span></cs-avatar>
    <cs-avatar data-color="purple" data-size="lg"><img src="https://i.pravatar.cc/80?img=14" alt=""><span class="avatar-status" data-offline></span></cs-avatar>
  </div>

  <div class="row">
    <span class="row-label">小尺寸</span>
    <cs-avatar data-color="sky" data-size="sm"><img src="https://i.pravatar.cc/48?img=15" alt=""><span class="avatar-status" data-online></span></cs-avatar>
    <cs-avatar data-color="pink"><img src="https://i.pravatar.cc/64?img=16" alt=""><span class="avatar-status" data-online></span></cs-avatar>
  </div>
</div>

<!-- 深色背景 -->
<div class="section">
  <div class="section-title">深色背景</div>
  <div class="dark-bg">
    <cs-avatar data-color="blue" data-size="lg"><img src="https://i.pravatar.cc/80?img=17" alt=""></cs-avatar>
    <cs-avatar data-size="lg" data-color="blue"><span class="avatar-text">张</span></cs-avatar>
    <cs-avatar data-color="green" data-size="lg"><i class="avatar-icon cses-stratis-user-profile-01"></i></cs-avatar>
    <cs-avatar data-color="orange" data-size="lg" data-shape="square"><img src="https://i.pravatar.cc/80?img=18" alt=""></cs-avatar>
  </div>
</div>

</body>
</html>
