<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>cs-nav-action-btn 组件预览</title>
  <link rel="stylesheet" href="../../../css/base.css">
  <link rel="stylesheet" href="../../../fonts/cses-icons.css?v=101">
  <link rel="stylesheet" href="nav-action-btn.css">
  <style>
    body { padding: 32px; background: #f5f5f5; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .section-title { font: var(--typo-cn-16-medium); color: var(--cs-color-text); margin-bottom: 16px; }
    .section-subtitle { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
    .row-label { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); width: 80px; flex-shrink: 0; }
    .nav-container { width: 200px; padding: var(--space-sm); background: var(--cs-color-bg-light); border-radius: var(--radius); }
  </style>
</head>
<body>

<!-- 基础状态 -->
<div class="section">
  <div class="section-title">基础状态</div>
  <div class="section-subtitle">导航栏内全宽操作按钮，用于新建任务/文档</div>

  <div class="row">
    <span class="row-label">默认</span>
    <div class="nav-container">
      <cs-nav-action-btn>
        <i class="nav-action-icon cses-icons-plus"></i>
        <span class="nav-action-label">新建任务</span>
      </cs-nav-action-btn>
    </div>
  </div>

  <div class="row">
    <span class="row-label">新建文档</span>
    <div class="nav-container">
      <cs-nav-action-btn>
        <i class="nav-action-icon cses-icons-plus"></i>
        <span class="nav-action-label">新建文档</span>
      </cs-nav-action-btn>
    </div>
  </div>

  <div class="row">
    <span class="row-label">仅图标</span>
    <div class="nav-container">
      <cs-nav-action-btn>
        <i class="nav-action-icon cses-icons-plus"></i>
      </cs-nav-action-btn>
    </div>
  </div>
</div>

<!-- 禁用状态 -->
<div class="section">
  <div class="section-title">禁用状态</div>
  <div class="section-subtitle">data-disabled</div>

  <div class="row">
    <span class="row-label">禁用</span>
    <div class="nav-container">
      <cs-nav-action-btn data-disabled>
        <i class="nav-action-icon cses-icons-plus"></i>
        <span class="nav-action-label">新建任务</span>
      </cs-nav-action-btn>
    </div>
  </div>
</div>

</body>
</html>
