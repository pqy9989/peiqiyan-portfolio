<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>未命名文件 — 画板</title>

  <link rel="stylesheet" href="../../design/css/base.css">
  <link rel="stylesheet" href="../../design/css/token.css">
  <link rel="stylesheet" href="../../design/css/variable.css">
  <link rel="stylesheet" href="../../design/fonts/cses-icons.css?v=101">

  <link rel="stylesheet" href="./board.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>

<div class="bd-app">

  <!-- 顶部栏：左右两张白卡 -->
  <header class="bd-topbar">

    <!-- 文件名卡 -->
    <div class="bd-tcard bd-tcard--file">
      <div class="bd-tc-inner">
        <span class="bd-tc-icon" title="返回文档库" onclick="window.location.href='./index.html'">
          <i class="cses-stratis-home-01"></i>
        </span>
        <span class="bd-tc-icon" title="菜单">
          <i class="cses-stratis-menu-04"></i>
        </span>
        <span class="bd-tc-vline"></span>
        <span class="bd-tc-cloud" title="云端"><i class="cses-stratis-check-broken"></i></span>
        <span class="bd-tc-name">未命名文件</span>
        <span class="bd-tc-cloud" title="同步状态"><i class="cses-stratis-check-broken"></i></span>
      </div>
    </div>

    <!-- 工具+分享卡 -->
    <div class="bd-tcard bd-tcard--actions">
      <div class="bd-tc-inner">
        <div class="bd-tc-tools">
          <button class="bd-tc-tool"><i class="cses-stratis-search-01"></i><span>搜索</span></button>
          <button class="bd-tc-tool"><i class="cses-stratis-video-on"></i><span>演说</span></button>

          <button class="bd-tc-tool"><i class="cses-stratis-menu-04"></i><span>更多</span></button>
        </div>
        <span class="bd-tc-vline"></span>

        </button>
      </div>
    </div>
  </header>

  <!-- 主体三栏：左侧白卡 / 中央画布 / 右侧设置卡 -->
  <div class="bd-body">

    <!-- 左侧工具栏（白卡）-->
    <div class="bd-left">
      <aside class="bd-sidebar">
        <span class="bd-ai" title="AI"><i class="cses-stratis-stars"></i></span>
        <span class="bd-sb-line"></span>

        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">B</span>
          <i class="bd-sb-item__icon cses-stratis-stop-01"></i>
          <span class="bd-sb-item__label">画板</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">T</span>
          <i class="bd-sb-item__icon cses-stratis-file-edit-01"></i>
          <span class="bd-sb-item__label">文本</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">N</span>
          <i class="bd-sb-item__icon cses-stratis-file-01"></i>
          <span class="bd-sb-item__label">便签</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">S</span>
          <i class="bd-sb-item__icon cses-stratis-grid-01"></i>
          <span class="bd-sb-item__label">形状</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">A</span>
          <i class="bd-sb-item__icon cses-stratis-arrow-up-right"></i>
          <span class="bd-sb-item__label">箭头</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">P</span>
          <i class="bd-sb-item__icon cses-stratis-edit-01"></i>
          <span class="bd-sb-item__label">画笔</span>
        </button>
        <button class="bd-sb-item" id="bdMindmapBtn">
          <span class="bd-sb-item__hot">H</span>
          <span class="bd-sb-item__svg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1" y="10" width="6" height="4" rx="1"></rect>
              <rect x="17" y="3" width="6" height="4" rx="1"></rect>
              <rect x="17" y="10" width="6" height="4" rx="1"></rect>
              <rect x="17" y="17" width="6" height="4" rx="1"></rect>
              <path d="M7 12 C 11 12, 13 5, 17 5"></path>
              <path d="M7 12 H 17"></path>
              <path d="M7 12 C 11 12, 13 19, 17 19"></path>
            </svg>

          <span class="bd-sb-item__label">导图</span>

        <button class="bd-sb-item">

        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">D</span>
          <i class="bd-sb-item__icon cses-stratis-file-01"></i>
          <span class="bd-sb-item__label">文档</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">B</span>
          <i class="bd-sb-item__icon cses-stratis-check-square-broken"></i>
          <span class="bd-sb-item__label">看板</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">S</span>
          <i class="bd-sb-item__icon cses-stratis-bar-chart-04"></i>
          <span class="bd-sb-item__label">数据</span>
        </button>
        <button class="bd-sb-item">
          <span class="bd-sb-item__hot">T</span>
          <i class="bd-sb-item__icon cses-stratis-grid-01"></i>
          <span class="bd-sb-item__label">模板库</span>
        </button>

        <span class="bd-sb-line"></span>
        <span class="bd-sb-more" title="更多"><i class="cses-stratis-menu-04"></i></span>
      </aside>
    </div>

    <!-- 中央画布 -->
    <div class="bd-center">
      <div class="bd-canvas-area" id="bdCanvasArea">
        <div class="bd-canvas-wrap" id="bdCanvasWrap">
          <span class="bd-canvas-label">未命名</span>

        <!-- 选位置时的对齐参考线 -->

        <span class="bd-guide bd-guide--h" id="bdGuideBottom"></span>
        <span class="bd-guide bd-guide--v" id="bdGuideLeft"></span>
        <span class="bd-guide bd-guide--v" id="bdGuideRight"></span>

      <!-- 思维导图画板模板（克隆用） -->
      <template id="bdMmTemplate">
        <div class="bd-canvas bd-canvas--mm">
          <div class="bd-mm-dashed">
            <span class="bd-mm-hint">将元素拖拽进来或者选择以下操作</span>
            <div class="bd-mm-actions">
              <button class="bd-mm-action">
                <span class="bd-mm-action__icon">
                  <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                  </svg>
                </span>
                <span class="bd-mm-action__label">添加形状</span>
              </button>
              <button class="bd-mm-action" onclick="window.location.href='./mindmap.html'">
                <span class="bd-mm-action__icon">
                  <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="3" y="3" width="18" height="18" rx="2"></rect>
                    <line x1="3" y1="9" x2="21" y2="9"></line>
                    <line x1="9" y1="9" x2="9" y2="21"></line>
                  </svg>
                </span>
                <span class="bd-mm-action__label">选择模板</span>
              </button>
              <button class="bd-mm-action">
                <span class="bd-mm-action__icon">
                  <svg viewBox="0 0 24 24" width="100%" height="100%" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3l1.9 4.6L18.5 9 14 11l-2 5-2-5L5.5 9l4.6-1.4z"></path>
                    <path d="M19 14v3M19 21v0M17 18h2M21 18h0"></path>
                  </svg>
                </span>
                <span class="bd-mm-action__label">用AI创造</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- 底部缩放/撤销条（右下角）-->
      <div class="bd-bottom">
        <div class="bd-bot-card">
          <span class="bd-bot-icon" data-active title="选择">
            <i class="cses-stratis-arrow-up-right" style="transform:rotate(-90deg);"></i>
          </span>
          <span class="bd-bot-icon" id="bdZoomOut" title="缩小"><i class="cses-stratis-search-01"></i></span>
          <span class="bd-bot-zoom" id="bdZoomLabel">100%</span>
          <span class="bd-bot-icon" id="bdZoomIn" title="放大"><i class="cses-stratis-search-01"></i></span>
          <span class="bd-bot-vline"></span>
          <span class="bd-bot-icon" title="撤销"><i class="cses-stratis-arrow-rotate-left-01"></i></span>
          <span class="bd-bot-icon" title="重做"><i class="cses-stratis-arrow-rotate-right-01"></i></span>
          <span class="bd-bot-icon" title="历史"><i class="cses-stratis-alarm-01"></i></span>
        </div>
      </div>
    </div>

    <!-- 右侧设置面板 -->
    <div class="bd-right">
      <aside class="bd-rpanel">
        <div class="bd-rpanel__scroll">

          <!-- 画板设置 -->
          <div class="bd-rgroup">
            <div class="bd-rsection-head">
              <span class="bd-rsection-title">画板设置</span>
              <span class="bd-rsection-caret"><i class="cses-stratis-chevron-down"></i></span>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">画板名称</span>
              <div class="bd-rfield__value">
                <input class="bd-input" type="text" placeholder="请输入画板名称">
              </div>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">画板尺寸</span>
              <div class="bd-rfield__value">
                <div class="bd-select">
                  <span>1600*900</span>
                  <i class="cses-stratis-chevron-down"></i>
                </div>
              </div>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">布局</span>
              <div class="bd-rfield__value">
                <div class="bd-checks">
                  <span class="bd-check">
                    <span class="bd-check__box"></span>
                    <span class="bd-check__label">横向</span>
                  </span>
                  <span class="bd-check" data-checked>
                    <span class="bd-check__box"></span>
                    <span class="bd-check__label">纵向</span>
                  </span>
                </div>
              </div>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">画板</span>
              <div class="bd-rfield__value">
                <div class="bd-checks">
                  <span class="bd-check" data-checked>
                    <span class="bd-check__box"></span>
                    <span class="bd-check__label">纯色</span>
                  </span>
                  <span class="bd-check">
                    <span class="bd-check__box"></span>
                    <span class="bd-check__label">纹理</span>
                  </span>
                </div>
              </div>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">颜色</span>
              <div class="bd-rfield__value">
                <div class="bd-color-select">
                  <span class="bd-color-swatch"></span>
                  <div class="bd-color-right">
                    <span class="bd-color-vline"></span>
                    <span class="bd-color-num">100</span>
                    <span class="bd-color-pct">%</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="bd-row-plus">
              <span class="bd-row-plus__label">边框</span>
              <span class="bd-row-plus__add"><i class="cses-stratis-plus-01"></i></span>
            </div>

            <div class="bd-row-plus">
              <span class="bd-row-plus__label">阴影</span>
              <span class="bd-row-plus__add"><i class="cses-stratis-plus-01"></i></span>
            </div>
          </div>

          <!-- 导出 -->
          <div class="bd-rgroup">
            <div class="bd-rsection-head">
              <span class="bd-rsection-title">导出</span>
              <span class="bd-row-plus__add"><i class="cses-stratis-plus-01"></i></span>
            </div>

            <div class="bd-rfield">
              <span class="bd-rfield__label">格式</span>
              <div class="bd-rfield__value">
                <div class="bd-select">
                  <span>PNG</span>
                  <i class="cses-stratis-chevron-down"></i>

            <button class="bd-export-btn">导出</button>

<script>
  // 复选框切换
  document.querySelectorAll('.bd-check').forEach(function (el) {
    el.addEventListener('click', function () {
      el.toggleAttribute('data-checked');
    });
  });

  // 左侧工具切换 active
  document.querySelectorAll('.bd-sb-item').forEach(function (el) {
    el.addEventListener('click', function () {
      document.querySelectorAll('.bd-sb-item').forEach(function (x) { x.removeAttribute('data-active'); });
      el.setAttribute('data-active', '');
    });
  });

  // section 折叠 caret
  document.querySelectorAll('.bd-rsection-head').forEach(function (head) {
    head.addEventListener('click', function (e) {
      if (e.target.closest('.bd-row-plus__add')) return;
      var caret = head.querySelector('.bd-rsection-caret');
      if (caret) caret.style.transform = caret.style.transform === 'rotate(-90deg)' ? '' : 'rotate(-90deg)';
    });
  });

  // ===== 思维导图：点击 → 选位置 → 添加新画板 =====
  (function () {
    var btn       = document.getElementById('bdMindmapBtn');
    var area      = document.getElementById('bdCanvasArea');
    var container = document.getElementById('bdCanvases');
    var mainCv    = document.getElementById('bdCanvasMain');
    var tpl       = document.getElementById('bdMmTemplate');
    var guides = {
      top:    document.getElementById('bdGuideTop'),
      bottom: document.getElementById('bdGuideBottom'),
      left:   document.getElementById('bdGuideLeft'),
      right:  document.getElementById('bdGuideRight'),
    };
    if (!btn || !area || !container || !mainCv || !tpl) return;

    var inPlacementMode = false;
    var ghosts = [];

    function clearGhosts() {
      ghosts.forEach(function (g) { g.remove(); });
      ghosts = [];
    }
    function clearGuides() {
      Object.keys(guides).forEach(function (k) { guides[k].classList.remove('is-on'); });
    }

    function positionGuide(rect, type) {
      var areaRect = area.getBoundingClientRect();
      // 相对于 area 的坐标
      var top    = rect.top - areaRect.top;
      var bottom = rect.bottom - areaRect.top;
      var left   = rect.left - areaRect.left;
      var right  = rect.right - areaRect.left;

      if (type === 'right') {
        guides.top.style.top    = top + 'px';
        guides.bottom.style.top = (bottom - 1) + 'px';
        guides.top.classList.add('is-on');
        guides.bottom.classList.add('is-on');
      } else if (type === 'below') {
        guides.left.style.left   = left + 'px';
        guides.right.style.left  = (right - 1) + 'px';
        guides.left.classList.add('is-on');
        guides.right.classList.add('is-on');
      }
    }

    // 根据当前主画板位置 + 视觉缩放，刷新 ghost 的尺寸/位置（默认隐藏）
    function renderGhosts() {
      clearGhosts();
      var mainRect = mainCv.getBoundingClientRect();
      var areaRect = area.getBoundingClientRect();

      var w    = mainRect.width;
      var h    = mainRect.height;
      var zoom = w / 706;
      var gap  = 18.636 * zoom;

      function build(pos) {
        var g = document.createElement('div');
        g.className = 'bd-ghost';
        g.dataset.pos = pos;
        g.innerHTML = '<i class="cses-stratis-plus-01"></i><span class="bd-ghost__hint">放在' +
                      (pos === 'right' ? '右侧' : '下方') + '</span>';
        g.style.cssText =
          'position:absolute;' +
          'width:'  + w + 'px;' +
          'height:' + h + 'px;' +
          'font-size:' + Math.max(14, 32 * zoom) + 'px;';
        if (pos === 'right') {
          g.style.top  = (mainRect.top  - areaRect.top)  + 'px';
          g.style.left = (mainRect.right - areaRect.left + gap) + 'px';
        } else {
          g.style.top  = (mainRect.bottom - areaRect.top + gap) + 'px';
          g.style.left = (mainRect.left   - areaRect.left) + 'px';
        }
        g.addEventListener('click', function (e) {
          e.stopPropagation();
          placeMindmap(pos);
        });
        area.appendChild(g);
        return g;
      }

      ghosts = [build('right'), build('below')];
      return { right: ghosts[0], below: ghosts[1], mainRect: mainRect };
    }

    // 鼠标在画板四周哪个区域：根据相对位置决定显示哪个 ghost
    function updateZone(e, ctx) {
      if (!ctx) return;
      var r = mainCv.getBoundingClientRect();
      var mx = e.clientX, my = e.clientY;

      var rightZone = mx > r.right;
      var belowZone = my > r.bottom;

      // 同时偏离时，按偏离更远的轴优先
      if (rightZone && belowZone) {
        var dr = mx - r.right;
        var db = my - r.bottom;
        if (dr >= db) belowZone = false; else rightZone = false;
      }

      ctx.right.classList.toggle('is-on', rightZone);
      ctx.below.classList.toggle('is-on', belowZone);

      clearGuides();
      if (rightZone) positionGuide(r, 'right');
      else if (belowZone) positionGuide(r, 'below');
    }

    var moveCtx = null;
    function onMove(e) { updateZone(e, moveCtx); }

    function showGhostsForLayout(layout) {
      moveCtx = renderGhosts();
      area.addEventListener('mousemove', onMove);
    }
    function teardownGhosts() {
      area.removeEventListener('mousemove', onMove);
      moveCtx = null;
      clearGhosts();
      clearGuides();
    }

    function placeMindmap(pos) {
      var node = tpl.content.firstElementChild.cloneNode(true);
      container.appendChild(node);
      container.dataset.layout = pos; // "right" / "below"
      exitPlacement();
    }

    function enterPlacement() {
      if (inPlacementMode) return exitPlacement();
      inPlacementMode = true;
      btn.setAttribute('data-active', '');
      showGhostsForLayout(container.dataset.layout);
    }
    function exitPlacement() {
      inPlacementMode = false;
      btn.removeAttribute('data-active');
      teardownGhosts();
    }

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      enterPlacement();
    });
    // 点其它地方 / Esc 取消
    document.addEventListener('click', function (e) {
      if (!inPlacementMode) return;
      if (e.target.closest('.bd-ghost') || e.target.closest('#bdMindmapBtn')) return;
      exitPlacement();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && inPlacementMode) exitPlacement();
    });
  })();

  // ===== 缩放 + 空格拖拽平移 =====
  (function () {
    var area  = document.querySelector('.bd-canvas-area');
    var wrap  = document.querySelector('.bd-canvas-wrap');
    var label = document.getElementById('bdZoomLabel');
    var btnIn = document.getElementById('bdZoomIn');
    var btnOut= document.getElementById('bdZoomOut');
    if (!area || !wrap || !label) return;

    var zoom = 1, panX = 0, panY = 0;
    var MIN = 0.1, MAX = 4;

    function apply() {
      wrap.style.transform = 'translate(' + panX + 'px, ' + panY + 'px) scale(' + zoom + ')';
      label.textContent = Math.round(zoom * 100) + '%';
    }
    function setZoom(z) {
      zoom = Math.max(MIN, Math.min(MAX, z));
      apply();
    }

    // ----- 缩放 -----
    area.addEventListener('wheel', function (e) {
      if (!(e.ctrlKey || e.metaKey)) return;
      e.preventDefault();
      var step = Math.abs(e.deltaY) > 50 ? 0.15 : 0.08;
      setZoom(e.deltaY > 0 ? zoom - step : zoom + step);
    }, { passive: false });

    document.addEventListener('keydown', function (e) {
      if (!(e.ctrlKey || e.metaKey)) return;
      if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(zoom + 0.1); }
      else if (e.key === '-' || e.key === '_') { e.preventDefault(); setZoom(zoom - 0.1); }
      else if (e.key === '0') { e.preventDefault(); setZoom(1); panX = 0; panY = 0; apply(); }
    });

    btnIn  && btnIn.addEventListener('click',  function () { setZoom(zoom + 0.1); });
    btnOut && btnOut.addEventListener('click', function () { setZoom(zoom - 0.1); });
    label.addEventListener('dblclick', function () { setZoom(1); panX = 0; panY = 0; apply(); });

    // ----- 平移：空格 + 左键 / 中键 / 两指滚动 -----
    var spaceHeld = false;
    var dragging  = false;
    var sx = 0, sy = 0, sPanX = 0, sPanY = 0;

    function isTypingTarget(t) {
      return t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
    }

    function startDrag(e) {
      dragging = true;
      sx = e.clientX; sy = e.clientY;
      sPanX = panX; sPanY = panY;
      area.style.cursor = 'grabbing';
      e.preventDefault();
    }
    function endDrag() {
      if (!dragging) return;
      dragging = false;
      area.style.cursor = spaceHeld ? 'grab' : '';
    }

    document.addEventListener('keydown', function (e) {
      if (e.code === 'Space' && !spaceHeld && !isTypingTarget(e.target)) {
        spaceHeld = true;
        area.style.cursor = 'grab';
        e.preventDefault();
      }
    });
    document.addEventListener('keyup', function (e) {
      if (e.code === 'Space') {
        spaceHeld = false;
        if (!dragging) area.style.cursor = '';
      }
    });

    area.addEventListener('mousedown', function (e) {
      // 中键（滚轮按下） 或 空格 + 左键 → 平移
      if (e.button === 1 || (e.button === 0 && spaceHeld)) {
        startDrag(e);
      }
    });
    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      panX = sPanX + (e.clientX - sx);
      panY = sPanY + (e.clientY - sy);
      apply();
    });
    document.addEventListener('mouseup', endDrag);

    // 拦截中键默认行为（Win 上的自动滚动 / Linux 上的粘贴）
    area.addEventListener('auxclick', function (e) {
      if (e.button === 1) e.preventDefault();
    });

    // 触摸板两指滚动 → 平移（不按 Cmd/Ctrl 时）
    area.addEventListener('wheel', function (e) {
      if (e.ctrlKey || e.metaKey) return; // 缩放已处理
      e.preventDefault();
      panX -= e.deltaX;
      panY -= e.deltaY;
      apply();
    }, { passive: false });

    apply();
  })();
</script>
</body>
</html>
