<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>cs-input 组件预览</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../fonts/cses-icons.css?v=101">
  <link rel="stylesheet" href="input.css">
  <style>
    body { padding: 32px; background: #f5f5f5; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .section-title { font: var(--typo-cn-16-medium); color: var(--cs-color-text); margin-bottom: 16px; }
    .section-subtitle { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
    .row-label { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); width: 80px; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- 默认输入框 -->
<div class="section">
  <div class="section-title">默认输入框</div>
  <div class="section-subtitle">基础用法</div>

  <div class="row">
    <span class="row-label">常态</span>
    <cs-input>
      <input class="input-field" type="text" placeholder="请输入内容">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">有内容</span>
    <cs-input>
      <input class="input-field" type="text" value="已输入的内容">
    </cs-input>
  </div>
</div>

<!-- 交互状态 -->
<div class="section">
  <div class="section-title">交互状态</div>
  <div class="section-subtitle">data-focus / data-error / data-disabled</div>

  <div class="row">
    <span class="row-label">默认</span>
    <cs-input>
      <input class="input-field" type="text" placeholder="默认状态">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">聚焦</span>
    <cs-input data-focus>
      <input class="input-field" type="text" placeholder="聚焦状态">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">错误</span>
    <cs-input data-error>
      <input class="input-field" type="text" value="格式错误">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">禁用</span>
    <cs-input data-disabled>
      <input class="input-field" type="text" placeholder="禁用状态" disabled>
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">禁用有值</span>
    <cs-input data-disabled>
      <input class="input-field" type="text" value="不可编辑" disabled>
    </cs-input>
  </div>
</div>

<!-- 尺寸 -->
<div class="section">
  <div class="section-title">尺寸</div>
  <div class="section-subtitle">data-size="sm" / 默认md / data-size="lg"</div>

  <div class="row">
    <span class="row-label">sm 28px</span>
    <cs-input data-size="sm">
      <input class="input-field" type="text" placeholder="小尺寸">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">md 32px</span>
    <cs-input>
      <input class="input-field" type="text" placeholder="中尺寸（默认）">
    </cs-input>
  </div>

  <div class="row">
    <span class="row-label">lg 36px</span>
    <cs-input data-size="lg">
      <input class="input-field" type="text" placeholder="大尺寸">
    </cs-input>
  </div>
</div>

</body>
</html>
