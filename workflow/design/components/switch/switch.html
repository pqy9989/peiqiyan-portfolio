<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>cs-switch 组件预览</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="switch.css">
  <style>
    body { padding: 32px; background: #f5f5f5; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .section-title { font: var(--typo-cn-16-medium); color: var(--cs-color-text); margin-bottom: 16px; }
    .section-subtitle { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); margin-bottom: 16px; }
    .row { display: flex; align-items: center; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
    .row-label { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); width: 100px; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- 大尺寸 Large (默认 40×24) -->
<div class="section">
  <div class="section-title">大尺寸 Large（默认）</div>
  <div class="section-subtitle">40×24，默认尺寸，无需 data-size</div>

  <div class="row">
    <span class="row-label">关闭</span>
    <cs-switch>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">开启</span>
    <cs-switch data-checked>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">关闭 + 禁用</span>
    <cs-switch data-disabled>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">开启 + 禁用</span>
    <cs-switch data-checked data-disabled>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>
</div>

<!-- 小尺寸 Small (28×16) -->
<div class="section">
  <div class="section-title">小尺寸 Small</div>
  <div class="section-subtitle">28×16，data-size="sm"</div>

  <div class="row">
    <span class="row-label">关闭</span>
    <cs-switch data-size="sm">
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">开启</span>
    <cs-switch data-size="sm" data-checked>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">关闭 + 禁用</span>
    <cs-switch data-size="sm" data-disabled>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">开启 + 禁用</span>
    <cs-switch data-size="sm" data-checked data-disabled>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>
</div>

<!-- 对比 -->
<div class="section">
  <div class="section-title">尺寸对比</div>

  <div class="row">
    <span class="row-label">Large 开启</span>
    <cs-switch data-checked>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
    <span class="row-label">Small 开启</span>
    <cs-switch data-size="sm" data-checked>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>

  <div class="row">
    <span class="row-label">Large 关闭</span>
    <cs-switch>
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
    <span class="row-label">Small 关闭</span>
    <cs-switch data-size="sm">
      <div class="switch-track"><div class="switch-knob"></div></div>
    </cs-switch>
  </div>
</div>

</body>
</html>
