<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>cs-form-group 组件预览</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../fonts/cses-icons.css?v=101">
  <link rel="stylesheet" href="../input/input.css">
  <link rel="stylesheet" href="../select/select.css">
  <link rel="stylesheet" href="form-group.css">
  <style>
    body { padding: 32px; background: #f5f5f5; }
    .section { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; }
    .section-title { font: var(--typo-cn-16-medium); color: var(--cs-color-text); margin-bottom: 16px; }
    .section-subtitle { font: var(--typo-cn-12-regular); color: var(--cs-color-text-light2); margin-bottom: 16px; }
    .row { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  </style>
</head>
<body>

<!-- 垂直排列（默认） -->
<div class="section">
  <div class="section-title">垂直排列（默认）</div>
  <div class="section-subtitle">标签在上，字段在下</div>

  <div class="row">
    <cs-form-group>
      <span class="form-label">用户名</span>
      <div class="form-field">
        <cs-input>
          <input class="input-field" type="text" placeholder="请输入用户名">
        </cs-input>
      </div>
      <span class="form-helper">3-20个字符，支持中英文</span>
    </cs-form-group>
  </div>

  <div class="row">
    <cs-form-group data-required>
      <span class="form-label">邮箱地址</span>
      <div class="form-field">
        <cs-input>
          <input class="input-field" type="email" placeholder="请输入邮箱">
        </cs-input>
      </div>
      <span class="form-helper">用于接收通知</span>
    </cs-form-group>
  </div>

  <div class="row">
    <cs-form-group data-required data-error>
      <span class="form-label">密码</span>
      <div class="form-field">
        <cs-input data-error>
          <input class="input-field" type="password" placeholder="请输入密码">
        </cs-input>
      </div>
      <span class="form-helper">至少8个字符</span>
      <span class="form-error">密码长度不能少于8个字符</span>
    </cs-form-group>
  </div>
</div>

<!-- 水平排列 -->
<div class="section">
  <div class="section-title">水平排列</div>
  <div class="section-subtitle">标签在左，字段在右（data-direction="horizontal"）</div>

  <div class="row">
    <cs-form-group data-direction="horizontal" style="width:400px;">
      <span class="form-label">姓名</span>
      <div class="form-field">
        <cs-input>
          <input class="input-field" type="text" placeholder="请输入姓名">
        </cs-input>
      </div>
    </cs-form-group>
  </div>

  <div class="row">
    <cs-form-group data-direction="horizontal" data-required style="width:400px;">
      <span class="form-label">部门</span>
      <div class="form-field">
        <cs-input>
          <input class="input-field" type="text" placeholder="请选择部门">
        </cs-input>
      </div>
    </cs-form-group>
  </div>

  <div class="row">
    <cs-form-group data-direction="horizontal" data-required data-error style="width:400px;">
      <span class="form-label">手机号</span>
      <div class="form-field">
        <cs-input data-error>
          <input class="input-field" type="text" placeholder="请输入手机号">
        </cs-input>
        <span class="form-error">请输入正确的手机号格式</span>
      </div>
    </cs-form-group>
  </div>
</div>

</body>
</html>
