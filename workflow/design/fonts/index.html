<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CSES 字体资源库</title>
  <meta http-equiv="Cache-Control" content="no-cache">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="cses-icons.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    /* ===== Editorial / Linear-Swiss tokens =====
       hairline   #ECECEC   分割线
       medium     #E5E5E5   边框
       chrome     #FAFAFA   topbar 衬底
       text-1     #0A0A0A   primary
       text-2     #666666   secondary
       text-3     #999999   muted
       accent     #4857E2   仅 active / link
    */

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
      font-family: "Inter", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
      color: #0A0A0A;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 顶部栏 ===== */
    .doc-topbar {
      height: 52px;
      background: #FFFFFF;
      border-bottom: 0.5px solid #ECECEC;
      display: flex;
      align-items: center;
      padding: 0 28px;
      flex-shrink: 0;
      gap: 14px;
    }
    .doc-topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #0A0A0A;
      letter-spacing: -0.2px;
      text-decoration: none;
    }
    .doc-topbar-logo-dot {
      width: 20px; height: 20px; border-radius: 5px;
      background: #0A0A0A;
      display: flex; align-items: center; justify-content: center;
      color: #FFFFFF; font-size: 10px; font-weight: 500;
      letter-spacing: 0;
    }
    .doc-topbar-divider { width: 1px; height: 14px; background: #ECECEC; }
    .doc-topbar-subtitle { font-size: 12px; color: #666666; }
    .doc-topbar-count {
      margin-left: auto;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 10px;
      color: #999999;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: transparent;
      padding: 0;
      border-radius: 0;
    }
    .doc-topbar-link {
      font-size: 11px;
      color: #666666;
      text-decoration: none;
      padding: 5px 10px;
      border: 0.5px solid #E5E5E5;
      border-radius: 4px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: all .15s;
    }
    .doc-topbar-link:hover { border-color: #0A0A0A; color: #0A0A0A; }

    /* ===== 主体布局 ===== */
    .doc-layout { flex: 1; display: flex; overflow: hidden; }

    /* ===== 左侧导航 ===== */
    .doc-sidebar {
      width: 220px;
      flex-shrink: 0;
      background: #FFFFFF;
      border-right: 0.5px solid #ECECEC;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .doc-search-wrap {
      padding: 14px 20px 12px;
      border-bottom: 0.5px solid #ECECEC;
      flex-shrink: 0;
    }
    .doc-search-container { position: relative; }
    .doc-search {
      width: 100%;
      height: 28px;
      border: none;
      border-bottom: 0.5px solid #E5E5E5;
      border-radius: 0;
      background: transparent;
      padding: 0 0 0 22px;
      font-size: 12px;
      color: #0A0A0A;
      outline: none;
      transition: border-color .2s;
    }
    .doc-search::placeholder { color: #999999; }
    .doc-search:focus { border-bottom-color: #0A0A0A; }
    .doc-search-icon {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      color: #999999;
      font-size: 12px;
      pointer-events: none;
    }

    .doc-nav-scroll { flex: 1; overflow-y: auto; padding: 6px 0 16px; counter-reset: navnum; }
    .doc-nav-scroll::-webkit-scrollbar { width: 4px; }
    .doc-nav-scroll::-webkit-scrollbar-thumb { background: #ECECEC; border-radius: 0; }

    .doc-nav-group { padding: 16px 0 4px; }
    .doc-nav-group:first-child { padding-top: 12px; }
    .doc-nav-group-label {
      padding: 4px 20px 10px;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 9px;
      font-weight: 400;
      color: #999999;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .doc-nav-item {
      display: flex;
      align-items: center;
      padding: 7px 20px;
      font-size: 12.5px;
      color: #666666;
      cursor: pointer;
      transition: color .12s;
      gap: 8px;
      user-select: none;
      counter-increment: navnum;
      position: relative;
    }
    .doc-nav-item::before {
      content: counter(navnum, decimal-leading-zero);
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 9px;
      color: #BBBBBB;
      letter-spacing: 0.4px;
      margin-right: 2px;
      flex-shrink: 0;
    }
    .doc-nav-item:hover { color: #0A0A0A; }
    .doc-nav-item.active {
      background: transparent;
      color: #0A0A0A;
      font-weight: 500;
      letter-spacing: -0.1px;
    }
    .doc-nav-item.active::before { color: #4857E2; }
    .doc-nav-item i { font-size: 13px; opacity: .7; display: none; }
    .doc-nav-item .nav-count {
      margin-left: auto;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 9px;
      color: #BBBBBB;
      background: transparent;
      padding: 0;
      border-radius: 0;
      letter-spacing: 0.4px;
    }
    .doc-nav-item.active .nav-count { color: #999999; }

    /* ===== 右侧内容 ===== */
    .doc-content { flex: 1; overflow: auto; display: flex; flex-direction: column; background: #FFFFFF; }
    .doc-content::-webkit-scrollbar { width: 6px; }
    .doc-content::-webkit-scrollbar-thumb { background: #ECECEC; border-radius: 0; }

    .page { padding: 36px 40px; width: 100%; }
    .page-header { margin-bottom: 28px; padding-bottom: 28px; border-bottom: 0.5px solid #ECECEC; }
    .page-title {
      font-size: 32px;
      font-weight: 500;
      color: #0A0A0A;
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 10px;
      letter-spacing: -0.8px;
      line-height: 1.1;
    }
    .page-title-tag {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 10px;
      color: #999999;
      background: transparent;
      padding: 0;
      border-radius: 0;
      border: none;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-weight: 400;
    }
    .page-subtitle {
      font-size: 13px;
      color: #666666;
      line-height: 1.7;
      max-width: 560px;
    }

    /* ===== 概览数字（无卡片，hairline 分割） ===== */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0;
      margin-bottom: 44px;
    }
    .stat-card {
      background: transparent;
      border: none;
      border-left: 0.5px solid #ECECEC;
      border-radius: 0;
      padding: 4px 24px 4px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .stat-card:first-child { border-left: none; padding-left: 0; }
    .stat-card:hover { opacity: 0.65; transform: none; box-shadow: none; }
    .stat-card-label {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 9px;
      color: #999999;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .stat-card-value {
      font-size: 42px;
      font-weight: 500;
      color: #0A0A0A;
      line-height: 1;
      margin-bottom: 0;
      font-family: "Inter", "SF Pro Display", -apple-system, sans-serif;
      letter-spacing: -1.6px;
    }
    .stat-card-unit { font-size: 12px; color: #999999; margin-left: 6px; letter-spacing: -0.2px; }
    .stat-card-hint {
      margin-top: 10px;
      font-size: 10px;
      color: #999999;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      letter-spacing: 0.4px;
    }

    /* ===== Logo 展示 ===== */
    .logo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0;
      border-top: 0.5px solid #ECECEC;
      border-left: 0.5px solid #ECECEC;
    }
    .logo-card {
      background: #FFFFFF;
      border-right: 0.5px solid #ECECEC;
      border-bottom: 0.5px solid #ECECEC;
      border-radius: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .logo-card-stage {
      flex: 1;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .logo-card-stage.dark { background: #0A0A0A; }
    .logo-card-stage.light { background: #FFFFFF; }
    .logo-card-meta {
      padding: 12px 16px;
      border-top: 0.5px solid #ECECEC;
      font-size: 11px;
      color: #999999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      letter-spacing: 0.2px;
    }
    .logo-card-meta code {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      color: #0A0A0A;
      background: transparent;
      padding: 0;
      border-radius: 0;
      font-size: 10px;
      letter-spacing: 0.2px;
    }

    /* ===== 字体文件表 ===== */
    .file-table-wrap {
      background: transparent;
      border-radius: 0;
      border: none;
      border-top: 0.5px solid #ECECEC;
      overflow: hidden;
    }
    .file-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .file-table th {
      background: transparent;
      padding: 14px 0;
      text-align: left;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-weight: 400;
      color: #999999;
      border-bottom: 0.5px solid #ECECEC;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .file-table th:first-child { padding-left: 0; }
    .file-table td {
      padding: 16px 0;
      border-bottom: 0.5px solid #ECECEC;
      color: #0A0A0A;
      vertical-align: middle;
    }
    .file-table tr:last-child td { border-bottom: 0.5px solid #ECECEC; }
    .file-table tr:hover td { background: transparent; color: #0A0A0A; }
    .file-name {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 12px;
      color: #0A0A0A;
      background: transparent;
      padding: 0;
      border-radius: 0;
      display: inline-block;
      letter-spacing: -0.2px;
    }
    .file-type-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 2px;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 9px;
      background: transparent;
      color: #666666;
      border: 0.5px solid #E5E5E5;
      letter-spacing: 0.6px;
    }

    /* ===== 图标网格 ===== */
    .icon-toolbar {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 0;
      padding: 14px 0;
      background: transparent;
      border: none;
      border-bottom: 0.5px solid #ECECEC;
      border-radius: 0;
    }
    .icon-toolbar input {
      flex: 1;
      min-width: 200px;
      padding: 6px 0;
      border: none;
      border-bottom: 0.5px solid transparent;
      border-radius: 0;
      font-size: 13px;
      color: #0A0A0A;
      background: transparent;
      outline: none;
    }
    .icon-toolbar input::placeholder { color: #999999; }
    .icon-toolbar input:focus { border-bottom-color: #0A0A0A; }
    .icon-toolbar .size-chips { display: flex; gap: 0; border: 0.5px solid #E5E5E5; border-radius: 3px; overflow: hidden; }
    .size-chip {
      padding: 4px 10px;
      font-size: 10px;
      border: none;
      border-left: 0.5px solid #E5E5E5;
      border-radius: 0;
      background: #FFFFFF;
      color: #666666;
      cursor: pointer;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      letter-spacing: 0.4px;
    }
    .size-chip:first-child { border-left: none; }
    .size-chip:hover { color: #0A0A0A; }
    .size-chip.active {
      background: #0A0A0A;
      color: #FFFFFF;
    }
    .icon-toolbar .toolbar-count {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 10px;
      color: #999999;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-left: auto;
    }
    .icon-toolbar .toolbar-count strong { color: #0A0A0A; font-weight: 500; }

    .icon-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0;
      background: transparent;
      padding: 0;
      border-radius: 0;
      border: none;
      border-left: 0.5px solid #ECECEC;
      border-top: 0.5px solid #ECECEC;
    }
    .icon-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 18px 6px 12px;
      border-right: 0.5px solid #ECECEC;
      border-bottom: 0.5px solid #ECECEC;
      border-radius: 0;
      cursor: pointer;
      transition: background .12s;
      gap: 8px;
      min-height: 96px;
      user-select: none;
    }
    .icon-cell:hover { background: #FAFAFA; transform: none; }
    .icon-cell i { font-size: 22px; color: #0A0A0A; line-height: 1; }
    .icon-cell .cn {
      font-size: 10px;
      color: #999999;
      text-align: center;
      word-break: break-all;
      line-height: 1.3;
      max-width: 100%;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      letter-spacing: 0.2px;
    }
    .icon-cell.copied { background: #0A0A0A; }
    .icon-cell.copied i, .icon-cell.copied .cn { color: #FFFFFF; }
    .icon-empty {
      padding: 60px 40px;
      text-align: center;
      color: #999999;
      font-size: 13px;
      background: transparent;
      border-radius: 0;
      border: none;
      border-top: 0.5px solid #ECECEC;
    }

    /* ===== 文档页（已废弃保留兜底） ===== */
    .doc-body {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      font-size: 14px;
      line-height: 1.7;
      color: #0A0A0A;
    }
    .doc-body h2 { font-size: 18px; margin: 22px 0 10px; font-weight: 500; }
    .doc-body h2:first-child { margin-top: 0; }
    .doc-body h3 { font-size: 15px; margin: 18px 0 8px; font-weight: 500; }
    .doc-body p { margin: 6px 0 10px; }
    .doc-body ul, .doc-body ol { padding-left: 22px; margin: 6px 0 10px; }
    .doc-body li { margin: 3px 0; }
    .doc-body code {
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 12px;
      background: transparent;
      padding: 0;
      border-radius: 0;
      color: #0A0A0A;
    }
    .doc-body pre {
      background: #0A0A0A;
      color: #ECECEC;
      padding: 14px 18px;
      border-radius: 0;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.6;
      margin: 10px 0;
    }
    .doc-body pre code { background: transparent; color: inherit; padding: 0; }
    .doc-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
    }
    .doc-body th, .doc-body td {
      padding: 8px 12px;
      border: 1px solid var(--cs-color-border, #e6e8ee);
      text-align: left;
    }
    .doc-body th { background: var(--cs-color-bg-light, #f5f6fa); font-weight: 600; }
    .doc-body blockquote {
      border-left: 3px solid var(--cs-color-primary, #4857e2);
      padding: 6px 14px;
      background: rgba(72,87,226,0.04);
      margin: 10px 0;
      color: var(--cs-color-text-light, #555);
    }
    .doc-body hr { border: none; border-top: 1px solid var(--cs-color-border, #e6e8ee); margin: 20px 0; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #0A0A0A;
      color: #FFFFFF;
      padding: 8px 16px;
      border-radius: 2px;
      font-family: "JetBrains Mono", "SF Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="doc-topbar">
  <div class="doc-topbar-logo">
    <div class="doc-topbar-logo-dot">C</div>
    CSES Design
  </div>
  <div class="doc-topbar-divider"></div>
  <span class="doc-topbar-subtitle">字体资源库</span>
  <span class="doc-topbar-count" id="topbarCount">— 个图标</span>
  <a class="doc-topbar-link" href="icons.html" target="_blank">图标管理 →</a>
</div>

<div class="doc-layout">
  <aside class="doc-sidebar">
    <div class="doc-search-wrap">
      <div class="doc-search-container">
        <i class="cses-stratis-search-01 doc-search-icon"></i>
        <input class="doc-search" id="navSearch" type="search" placeholder="筛选导航..." autocomplete="off">
      </div>
    </div>
    <div class="doc-nav-scroll">
      <div class="doc-nav-group">
        <div class="doc-nav-group-label">概览</div>
        <div class="doc-nav-item active" data-view="overview">
          <i class="cses-stratis-layout-01"></i> 总览
        </div>
      </div>
      <div class="doc-nav-group">
        <div class="doc-nav-group-label">资源</div>
        <div class="doc-nav-item" data-view="logo">
          <i class="cses-stratis-image-01"></i> Logo
        </div>
        <div class="doc-nav-item" data-view="files">
          <i class="cses-stratis-file-02"></i> 字体文件
          <span class="nav-count">3</span>
        </div>
      </div>
      <div class="doc-nav-group">
        <div class="doc-nav-group-label">图标</div>
        <div class="doc-nav-item" data-view="cses">
          <i class="cses-stratis-grid-01"></i> 面性图标
          <span class="nav-count" id="navCsesCount">—</span>
        </div>
        <div class="doc-nav-item" data-view="stratis">
          <i class="cses-stratis-bell-01"></i> 线性图标
          <span class="nav-count" id="navStratisCount">—</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="doc-content" id="docContent">
    <div class="page"><div class="icon-empty">加载中...</div></div>
  </main>
</div>

<div class="toast" id="toast">已复制</div>

<script>
(function () {
  'use strict';

  var docContent = document.getElementById('docContent');
  var navItems = document.querySelectorAll('.doc-nav-item');
  var navSearch = document.getElementById('navSearch');
  var toast = document.getElementById('toast');

  var toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toast.classList.remove('show'); }, 1400);
  }

  function copyText(t) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(t);
    }
    var ta = document.createElement('textarea');
    ta.value = t; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    return Promise.resolve();
  }

  function card(label, value, unit, hint, view, color) {
    return '<div class="stat-card" data-view="' + view + '">' +
      '<div class="stat-card-label">' +
        '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + color + ';"></span>' + label +
      '</div>' +
      '<div class="stat-card-value">' + value + '<span class="stat-card-unit">' + unit + '</span></div>' +
      '<div class="stat-card-hint">' + hint + '</div>' +
    '</div>';
  }

  function previewBlock(title, list) {
    var icons = list.map(function (e) { return '<i class="' + e.c + '" style="font-size:22px;color:#0A0A0A;margin:6px;" title="' + e.c + '"></i>'; }).join('');
    return '<div class="logo-card">' +
      '<div class="logo-card-stage light" style="flex-wrap:wrap;min-height:140px;padding:18px;">' + (icons || '<span style="color:#999;font-size:12px;">无</span>') + '</div>' +
      '<div class="logo-card-meta"><span>' + title + '</span><code>' + list.length + ' 个</code></div>' +
    '</div>';
  }

  function bindStatCards() {
    document.querySelectorAll('.stat-card').forEach(function (c) {
      c.addEventListener('click', function () { switchView(this.getAttribute('data-view')); });
    });
  }

          '<div class="page-subtitle">' + subtitle + '</div>' +
        '</div>' +
        '<div class="icon-toolbar">' +
          '<input id="iconSearch" placeholder="搜索图标 class 或中文名..." autocomplete="off">' +
          '<div class="size-chips">' +
            sizeChip(16) + sizeChip(22) + sizeChip(32) + sizeChip(48) +
          '</div>' +
          '<span class="toolbar-count">共 <strong id="iconCount">' + list.length + '</strong> 个</span>' +
        '</div>' +
        '<div class="icon-grid" id="iconGrid"></div>' +
      '</div>';

    renderIconGrid(list);

    var inp = document.getElementById('iconSearch');
    inp.addEventListener('input', function () {
      iconState.query = this.value.trim().toLowerCase();
      var filtered = list.filter(function (e) {
        if (!iconState.query) return true;
        return e.c.toLowerCase().indexOf(iconState.query) >= 0 || (e.n || '').toLowerCase().indexOf(iconState.query) >= 0;
      });
      document.getElementById('iconCount').textContent = filtered.length;
      renderIconGrid(filtered);
    });

    document.querySelectorAll('.size-chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        iconState.size = parseInt(this.getAttribute('data-size'), 10);
        document.querySelectorAll('.size-chip').forEach(function (c) { c.classList.toggle('active', c === chip); });
        document.querySelectorAll('.icon-cell i').forEach(function (i) { i.style.fontSize = iconState.size + 'px'; });
      });
    });
  }

  function sizeChip(n) {
    return '<button class="size-chip ' + (n === iconState.size ? 'active' : '') + '" data-size="' + n + '">' + n + 'px</button>';
  }

  function renderIconGrid(list) {
    var grid = document.getElementById('iconGrid');
    if (!grid) return;
    if (!list.length) {
      grid.outerHTML = '<div class="icon-empty">没有匹配的图标</div>';
      return;
    }
    // 大列表（817）—— 分批渲染避免长帧
    var BATCH = 200;
    grid.innerHTML = '';
    var i = 0;
    function next() {
      var frag = document.createDocumentFragment();
      var end = Math.min(i + BATCH, list.length);
      for (; i < end; i++) {
        var entry = list[i];
        var cls = entry.c;
        var label = entry.n || cls.replace(/^cses-(stratis-)?/, '');
        var cell = document.createElement('div');
        cell.className = 'icon-cell';
        cell.setAttribute('data-cls', cls);
        cell.title = cls + (entry.n ? ' · ' + entry.n : '');
        cell.innerHTML = '<i class="' + cls + '" style="font-size:' + iconState.size + 'px;"></i><span class="cn">' + label + '</span>';
        cell.addEventListener('click', function () {
          var c = this.getAttribute('data-cls');
          var self = this;
          copyText(c).then(function () {
            self.classList.add('copied');
            showToast('已复制：' + c);
            setTimeout(function () { self.classList.remove('copied'); }, 800);
          });
        });
        frag.appendChild(cell);
      }
      grid.appendChild(frag);
      if (i < list.length) requestAnimationFrame(next);
    }
    next();
  }

  /* ====== 路由 ====== */
  function switchView(view) {
    navItems.forEach(function (item) { item.classList.toggle('active', item.getAttribute('data-view') === view); });
    location.hash = view;
    if (view === 'overview') renderOverview();
    else if (view === 'logo') renderLogo();
    else if (view === 'files') renderFiles();
    else if (view === 'cses') renderIcons('face');
    else if (view === 'stratis') renderIcons('stratis');
  }

  navItems.forEach(function (item) {
    item.addEventListener('click', function () { switchView(this.getAttribute('data-view')); });
  });

  navSearch.addEventListener('input', function () {
    var q = this.value.trim().toLowerCase();
    navItems.forEach(function (item) {
      var txt = item.textContent.toLowerCase();
      item.style.display = (!q || txt.indexOf(q) >= 0) ? '' : 'none';
    });
  });

  /* ====== 启动：直接渲染（数据已 inline，无 fetch 依赖） ====== */
  document.getElementById('navCsesCount').textContent = ICONS.face.length;
  document.getElementById('navStratisCount').textContent = ICONS.stratis.length;
  document.getElementById('topbarCount').textContent = (ICONS.face.length + ICONS.stratis.length) + ' 个图标';
  var initView = (location.hash || '#overview').slice(1);
  if (!['overview', 'logo', 'files', 'cses', 'stratis'].includes(initView)) initView = 'overview';
  switchView(initView);
})();
</script>
</body>
</html>
